{{ define "main" }}
<div id="app" class="min-h-screen"></div>

<script>
  const DATA = {
    meta: {{ hugo.Data.mobilomat.meta | jsonify | safeJS }},
    questions: {{ hugo.Data.mobilomat.questions | jsonify | safeJS }},
    candidates: {{ hugo.Data.mobilomat.candidates | jsonify | safeJS }},
  };

  {{ $js := resources.Get "js/mobilomat.js" }}
  {{ if hugo.IsProduction }}
    {{ $js = $js | minify }}
  {{ end }}
  {{ $js.Content | safeJS }}
</script>
{{ end }}
