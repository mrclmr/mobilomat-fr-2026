{{ define "main" }} {{ $meta := hugo.Data.mobilomat.meta }}
<div class="flex min-h-screen flex-col">
  <div class="bg-vcd-petrol px-4 py-14 text-center sm:px-6">
    <div
      class="mb-5 inline-flex h-20 w-20 items-center justify-center rounded-full bg-white/20 text-4xl"
    >
      🚲
    </div>
    <h1 class="mb-2 text-white">{{ $meta.title1 }}</h1>
    <p class="text-white/80">{{ $meta.title2 }}</p>
  </div>
  <div class="flex flex-1 justify-center p-4 pt-8 sm:p-6 sm:pt-8">
    <div class="w-full max-w-lg">
      <div class="card mb-5">
        <p class="leading-relaxed text-stone-600 dark:text-stone-300">
          {{ $meta.description | safeHTML }}
        </p>
      </div>
      <button onclick="startQuiz()" class="btn-primary w-full text-lg">
        Los geht's →
      </button>
      <p class="mt-6 text-center text-xs text-stone-400 dark:text-stone-600">
        <a
          href="{{ $meta.imprintLink }}"
          target="_blank"
          rel="noopener"
          class="hover:underline"
          >Impressum</a
        >
      </p>
    </div>
  </div>
</div>
<script>
  function startQuiz() {
    localStorage.removeItem("mobilomat_answers");
    window.location.href = "/fragen/1/";
  }
</script>
{{ end }}
