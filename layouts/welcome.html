{{ define "main" }} {{ $meta := site.Data.mobilomat.meta }}
<div class="flex min-h-screen items-center justify-center p-4 sm:p-6">
  <div class="w-full max-w-lg">
    <div class="mb-8 text-center">
      <div
        class="mb-5 inline-flex h-20 w-20 items-center justify-center rounded-full bg-green-100 text-4xl dark:bg-green-900/30"
      >
        🚲
      </div>
      <h1 class="mb-2">{{ $meta.title1 }}</h1>
      <p class="text-stone-500 dark:text-stone-400">{{ $meta.title2 }}</p>
    </div>
    <div class="card mb-5">
      <p class="leading-relaxed text-stone-600 dark:text-stone-300">
        {{ $meta.description }}
      </p>
    </div>
    <button onclick="startQuiz()" class="btn-primary w-full text-lg">
      Los geht's →
    </button>
    <p class="mt-6 text-center text-xs text-stone-400 dark:text-stone-600">
      <a
        href="{{ $meta.imprintLink }}"
        target="_blank"
        rel="noopener"
        class="hover:underline"
        >Impressum</a
      >
    </p>
  </div>
</div>
<script>
  function startQuiz() {
    localStorage.removeItem("mobilomat_answers");
    window.location.href = "/fragen/1/";
  }
</script>
{{ end }}
