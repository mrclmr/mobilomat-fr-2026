{{ define "main" }} {{ $meta := hugo.Data.mobilomat.meta }}
<div class="flex min-h-screen flex-col">
  <div
    class="flex items-center justify-start overflow-hidden pl-10 pr-5 sm:pl-24 sm:pr-16"
    style="
      background-image: url(&quot;/vcd_background.jpg&quot;);
      background-size: cover;
      background-position: center;
      aspect-ratio: 1318/840;
    "
  >
    <div class="flex w-[55%] max-w-[55%] flex-col items-start gap-1 sm:gap-3">
      <div
        class="w-full rotate-[-3deg] rounded-2xl bg-vcd-green/70 px-3 py-2 sm:px-5 sm:py-8 text-center backdrop-blur-sm"
      >
        <h1 class="text-lg font-black tracking-tight text-white sm:text-5xl">
          {{ $meta.title1 }}
        </h1>
      </div>
      <div
        class="w-full rotate-[2deg] rounded-2xl bg-vcd-petrol/70 px-3 py-2 sm:px-5 sm:py-8 text-center backdrop-blur-sm"
      >
        <p class="text-xs font-medium leading-snug text-white sm:text-lg">
          {{ $meta.title2 | replaceRE "zur OB-Wahl" "<br />zur OB-Wahl" |
          safeHTML }}
        </p>
      </div>
    </div>
  </div>
  <div class="h-1.5 bg-vcd-green"></div>
  <div class="flex flex-1 justify-center p-4 pt-8 sm:p-6 sm:pt-8">
    <div class="w-full max-w-lg">
      <div class="card mb-5">
        <p class="leading-relaxed text-stone-600 dark:text-stone-300">
          {{ $meta.description | safeHTML }}
        </p>
      </div>
      <button onclick="startQuiz()" class="btn-primary w-full text-lg">
        Los geht's →
      </button>
      <p class="mt-6 text-center text-xs text-stone-400 dark:text-stone-600">
        <a
          href="{{ $meta.imprintLink }}"
          target="_blank"
          rel="noopener"
          class="hover:underline"
          >Impressum</a
        >
      </p>
    </div>
  </div>
</div>
<script>
  function startQuiz() {
    localStorage.removeItem("mobilomat_answers");
    window.location.href = "/fragen/1/";
  }
</script>
{{ end }}
