title1: "Mobil-O-Mat"
title2: "zur OB-Wahl 2026 in Freiburg"
description: >
  Am 26. April 2026 finden in Freiburg die OB-Wahlen statt. Sie können sich hier die Positionen der Kandidierenden anschauen und miteinander vergleichen. Dies ist <strong>keine Wahlempfehlung</strong>, sondern ein Informationsangebot zur Wahl! <br><br> Zur Auswahl stehen fünf Kandidierende mit unterschiedlichen Meinungen zum Thema Mobilität.

