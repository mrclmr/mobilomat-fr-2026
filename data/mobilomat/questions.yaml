- short: "Investitionen"
  long: "Die jährlichen städtischen Investitionen für den Fuß- und Radverkehr sollen um den Faktor 2-3 erhöht werden, so dass sie dann ungefähr dem Niveau von Kopenhagen oder Tübingen (2025) entsprechen."
- short: "Kinder im Verkehr"
  long: "Die Sicherheit von Kinder, die im Straßenverkehr zu Fuß oder mit dem Rad unterwegs sind hat höchste Priorität, auch wenn dadurch der Autoverkehr Nachteile hat."
- short: "Dreisamboulevard"
  long: "Der Dreisamboulevard ist auch ohne Stadttunnel möglich. Freiburg soll sich beim Bund dafür einsetzen, dass die hunderte Millionen Euro Tunnel-Budget direkt in die regionale Verkehrswende eingesetzt werden."
- short: "Fahrradparken"
  long: "Freiburg soll ein flächendeckendes Angebot an wettergeschützten Fahrradstellflächen schaffen. Dazu sollen auch bestehende Autoparkhäuser ganz oder teilweise umgestaltet werden."
- short: "Autofreie Rempartstraße"
  long: "Die Rempartstraße soll im Bereich vor der Mensa spätestens 2028 autofrei sein."
- short: "Anbindung an die Region"
  long: "Freiburg soll durch ein dichtes Netz aus Schnellbuslinien mit den Umlandgemeinden und beliebten Ausflugszielen verbunden werden."
- short: "Parkgebühren"
  long: "Für große Autos sollen deutlich mehr Parkgebühren anfallen als für kleine Autos."
- short: "Flächengerechtigkeit"
  long: "Die Stadt soll öffentliche Autoparkplätze deutlich zurückbauen, um mehr öffentlichen Straßenraum für Entsiegelung und Begegnungsflächen zu gewinnen."
- short: "Gehwegparken"
  long: "Zum Schutz von Kindern und Menschen mit Behinderung soll die Stadt konsequent gegen Gehwegparken vorgehen, auch wenn dadurch Parkplätze im öffentlichen Raum wegfallen."
- short: "City-Maut"
  long: "Freiburg soll eine City-Maut nach dem Vorbild von London und Paris einführen."
- short: "Schlossbergring"
  long: "Die östliche Hälfte des Schlossbergrings soll zukünftig vollständig dem Fuß- und Radverkehr zur Verfügung stehen."
- short: "Dreisamradweg"
  long: "Der Dreisamradweg soll überall mindestens vier Meter breit sein."
- short: "Lebenswerte Quartiere"
  long: "Wohnviertel sollen konsequent vom Durchgangsverkehr befreit werden."
- short: "Ausbau der Rheintalbahn"
  long: "Auf der bestehenden Güterbahnstrecke im Freiburger Westen soll im Rahmen des Ausbaus der Rheintalbahn eine S-Bahn-Linie entstehen."
- short: "Stadtbahn"
  long: "St. Georgen soll eine Stadtbahn erhalten."
